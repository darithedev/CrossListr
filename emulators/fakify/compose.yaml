services:
  fakify-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fakify
      POSTGRES_PASSWORD: fakify
      POSTGRES_DB: fakify
    volumes:
      - fakify_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fakify -d fakify"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - fakify

  fakify-migrate:
    build:
      context: ./migrations
      dockerfile: Dockerfile
    command:
      [
        "-database",
        "postgres://fakify:fakify@fakify-postgres:5432/fakify?sslmode=disable",
        "up",
      ]
    depends_on:
      fakify-postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - fakify

  fakify-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      FAKIFY_HTTP_ADDR: ":8080"
    depends_on:
      fakify-migrate:
        condition: service_completed_successfully
    ports:
      - "14282:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      fakify:
      integration:
        aliases:
          - fakify-backend

  fakify-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      fakify-backend:
        condition: service_healthy
    ports:
      - "14280:80"
    healthcheck:
      test:
        ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/ >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      fakify:
      integration:
        aliases:
          - fakify-frontend

  fakify-smoke:
    profiles: [smoke]
    image: curlimages/curl:8.11.1
    depends_on:
      fakify-backend:
        condition: service_healthy
      fakify-frontend:
        condition: service_healthy
    networks:
      - fakify
    command:
      [
        "sh",
        "-c",
        "set -e; curl -sf http://fakify-backend:8080/health | grep -q fakify; curl -sf http://fakify-frontend:80/ | grep -q Fakify; echo fakify smoke OK",
      ]
    restart: "no"

networks:
  fakify:
    driver: bridge
  integration:
    name: crosslistr-emulators-integration
    driver: bridge

volumes:
  fakify_pgdata:
