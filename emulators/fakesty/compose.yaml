services:
  fakesty-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fakesty
      POSTGRES_PASSWORD: fakesty
      POSTGRES_DB: fakesty
    volumes:
      - fakesty_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fakesty -d fakesty"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - fakesty

  fakesty-migrate:
    build:
      context: ./migrations
      dockerfile: Dockerfile
    command:
      [
        "-database",
        "postgres://fakesty:fakesty@fakesty-postgres:5432/fakesty?sslmode=disable",
        "up",
      ]
    depends_on:
      fakesty-postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - fakesty

  fakesty-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      FAKESTY_HTTP_ADDR: ":8080"
    depends_on:
      fakesty-migrate:
        condition: service_completed_successfully
    ports:
      - "14382:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      fakesty:
      integration:
        aliases:
          - fakesty-backend

  fakesty-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      fakesty-backend:
        condition: service_healthy
    ports:
      - "14380:80"
    healthcheck:
      test:
        ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/ >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      fakesty:
      integration:
        aliases:
          - fakesty-frontend

  fakesty-smoke:
    profiles: [smoke]
    image: curlimages/curl:8.11.1
    depends_on:
      fakesty-backend:
        condition: service_healthy
      fakesty-frontend:
        condition: service_healthy
    networks:
      - fakesty
    command:
      [
        "sh",
        "-c",
        "set -e; curl -sf http://fakesty-backend:8080/health | grep -q fakesty; curl -sf http://fakesty-frontend:80/ | grep -q Fakesty; echo fakesty smoke OK",
      ]
    restart: "no"

networks:
  fakesty:
    driver: bridge
  integration:
    name: crosslistr-emulators-integration
    driver: bridge

volumes:
  fakesty_pgdata:
