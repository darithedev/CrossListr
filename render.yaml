databases:
  - name: crosslistr-db
    databaseName: crosslistr_db
    user: crosslistr
    plan: free

services:
  - type: web
    name: crosslistr-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm ci
    startCommand: node src/server.js
    healthCheckPath: /health
    preDeployCommand: cd ../migrations && npm ci && npm run migrate
    envVars:
      - key: NODE_VERSION
        value: "24.15.0"
      - key: LISTEN_HOST
        value: "0.0.0.0"
      - key: DATABASE_URL
        fromDatabase:
          name: crosslistr-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: POSTGRES_USER
        fromDatabase:
          name: crosslistr-db
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: crosslistr-db
          property: password
      - key: POSTGRES_DB
        fromDatabase:
          name: crosslistr-db
          property: database
      - key: DB_HOST
        fromDatabase:
          name: crosslistr-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: crosslistr-db
          property: port
      - key: FRONTEND_URL
        sync: false
      - key: FAKEBAY_API_URL
        sync: false
      - key: FAKEBAY_CLIENT_ID
        sync: false
      - key: FAKEBAY_CLIENT_SECRET
        sync: false
      - key: FAKEBAY_REDIRECT_URI
        sync: false

  - type: web
    name: crosslistr-web
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: "24.15.0"
      - key: VITE_API_URL
        sync: false
      - key: VITE_CLOUDINARY_CLOUD_NAME
        sync: false
      - key: VITE_CLOUDINARY_UPLOAD_PRESET
        sync: false
      - key: VITE_FAKEBAY_AUTH_PUBLIC_URL
        sync: false